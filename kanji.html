<script>
const VISIBLE_COUNT = 24;
let currentDisplay = [];
let selectedKanji = new Set();
let quizMode = "romaji";

const grid = document.getElementById("kanji-grid");
const quizContainer = document.getElementById("quiz-container");
const countSpan = document.getElementById("selected-count");
const startBtn = document.getElementById("start-quiz-btn");

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function renderKanjiGrid() {
  currentDisplay = shuffle([...kanjiData]).slice(0, VISIBLE_COUNT);
  selectedKanji = new Set();
  countSpan.textContent = 0;
  grid.innerHTML = "";

  currentDisplay.forEach(d => {
    const card = document.createElement("div");
    card.className = "kanji-card relative group cursor-pointer bg-surface-bright border border-primary-fixed-dim rounded-xl p-4 flex flex-col items-center justify-center aspect-square transition-all duration-300 hover:shadow-lg hover:-translate-y-1";
    card.innerHTML = `
      <div class="selection-indicator absolute top-2 left-2 w-5 h-5 rounded-full border-2 border-outline-variant flex items-center justify-center transition-colors">
        <span class="material-symbols-outlined text-[14px] text-surface-bright opacity-0">check</span>
      </div>
      <div class="font-japanese-character text-japanese-character text-on-surface mb-2 mt-4 select-none">${d.char}</div>
      <div class="w-full mt-auto opacity-0 group-hover:opacity-100 transition-opacity text-center flex flex-col items-center bg-surface-container-low p-2 rounded-md absolute bottom-2 left-2 right-2 w-[calc(100%-16px)]">
        <span class="font-label-caps text-label-caps text-primary mb-1">${d.romaji}</span>
        <span class="font-body-md text-[12px] text-on-surface-variant truncate w-full">${d.meaning}</span>
      </div>
    `;
    card.addEventListener("click", () => {
      if (selectedKanji.has(d.char)) {
        selectedKanji.delete(d.char);
        deselectCard(card);
      } else {
        selectedKanji.add(d.char);
        selectCard(card);
      }
      countSpan.textContent = selectedKanji.size;
      speak(d.char);
    });
    grid.appendChild(card);
  });
}

function selectCard(card) {
  card.classList.add("ring-2", "ring-primary", "bg-primary-container/20");
  const indicator = card.querySelector(".selection-indicator");
  if (indicator) {
    indicator.classList.remove("border-outline-variant");
    indicator.classList.add("bg-primary", "border-primary");
    indicator.querySelector("span").classList.remove("opacity-0");
  }
}

function deselectCard(card) {
  card.classList.remove("ring-2", "ring-primary", "bg-primary-container/20");
  const indicator = card.querySelector(".selection-indicator");
  if (indicator) {
    indicator.classList.add("border-outline-variant");
    indicator.classList.remove("bg-primary", "border-primary");
    indicator.querySelector("span").classList.add("opacity-0");
  }
}

document.getElementById("reshuffle-btn").addEventListener("click", renderKanjiGrid);

document.getElementById("select-all-btn").addEventListener("click", () => {
  const allSelected = selectedKanji.size === currentDisplay.length;
  if (allSelected) {
    selectedKanji.clear();
    document.querySelectorAll(".kanji-card").forEach(deselectCard);
    document.getElementById("select-all-btn").querySelector("span:last-child").textContent = "Select All Visible";
  } else {
    currentDisplay.forEach(d => selectedKanji.add(d.char));
    document.querySelectorAll(".kanji-card").forEach(selectCard);
    document.getElementById("select-all-btn").querySelector("span:last-child").textContent = "Deselect All";
  }
  countSpan.textContent = selectedKanji.size;
});

document.getElementById("mode-romaji").addEventListener("click", () => {
  quizMode = "romaji";
  document.getElementById("mode-romaji").className = "flex-1 md:flex-none px-4 py-2 rounded-md bg-surface-bright shadow-sm text-on-surface font-body-md font-medium transition-all";
  document.getElementById("mode-meaning").className = "flex-1 md:flex-none px-4 py-2 rounded-md text-on-surface-variant hover:text-on-surface font-body-md font-medium transition-all";
});

document.getElementById("mode-meaning").addEventListener("click", () => {
  quizMode = "meaning";
  document.getElementById("mode-meaning").className = "flex-1 md:flex-none px-4 py-2 rounded-md bg-surface-bright shadow-sm text-on-surface font-body-md font-medium transition-all";
  document.getElementById("mode-romaji").className = "flex-1 md:flex-none px-4 py-2 rounded-md text-on-surface-variant hover:text-on-surface font-body-md font-medium transition-all";
});

startBtn.addEventListener("click", () => {
  const pool = kanjiData.filter(d => selectedKanji.has(d.char));
  if (pool.length === 0) return;
  quizContainer.classList.remove("hidden");
  quizContainer.scrollIntoView({ behavior: "smooth" });
  startQuiz(quizContainer, pool, quizMode, "kanji", {
    onAnswer: (correct, total) => updateSakura(correct, total),
    onComplete: (correct, total) => updateProgress("kanji", correct, total),
    onBack: () => {
      quizContainer.classList.add("hidden");
      quizContainer.innerHTML = "";
      document.querySelector("main").scrollIntoView({ behavior: "smooth" });
    }
  });
});

initSakura("progressive");
renderKanjiGrid();
</script>
