<script>
let currentDisplay = [];
let selectedKanji = new Set();
let quizMode = "romaji";

const grid = document.getElementById("kanji-grid");
const quizContainer = document.getElementById("quiz-container");
const countSpan = document.getElementById("selected-count");
const startBtn = document.getElementById("start-quiz-btn");

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function makeKanjiCard(d) {
  const card = document.createElement("button");
  card.type = "button";
  card.className = "kanji-card aspect-[1/1] bg-surface border border-outline-variant/50 rounded-md flex flex-col items-center justify-center hover:shadow-sm transition-[color,background-color,border-color,box-shadow] duration-200 relative group";
  card.dataset.char = d.char;
  card.setAttribute("aria-label", `${d.char} - ${d.romaji} - ${d.meaning}`);
  card.innerHTML = `
    <div class="absolute top-[1px] right-[1px] w-[2px] h-[2px] rounded-full border border-outline-variant transition-colors dot-indicator"></div>
    <span class="w-full text-center px-0.5 font-label-caps text-label-caps text-[9px] leading-none text-on-surface-variant truncate opacity-0 group-hover:opacity-100 transition-opacity absolute top-[2px] left-0">${d.meaning}</span>
    <span class="font-japanese-character text-[20px] sm:text-[22px] md:text-[26px] text-on-surface">${d.char}</span>
    <span class="font-label-caps text-label-caps text-secondary absolute bottom-[1px] opacity-0 group-hover:opacity-100 transition-opacity text-[9px] leading-none w-full text-center truncate px-0.5 romaji-label">${d.romaji}</span>
  `;
  card.addEventListener("click", () => {
    if (selectedKanji.has(d.char)) {
      selectedKanji.delete(d.char);
      updateCardVisual(card, false);
    } else {
      selectedKanji.add(d.char);
      updateCardVisual(card, true);
    }
    countSpan.textContent = selectedKanji.size;
    speak(d.char);
  });
  return card;
}

function updateCardVisual(card, isSelected) {
  const dot = card.querySelector(".dot-indicator");
  if (isSelected) {
    card.classList.add("ring-2", "ring-primary", "bg-primary-container/20");
    if (dot) { dot.classList.add("bg-primary", "border-primary"); dot.classList.remove("border-outline-variant"); }
  } else {
    card.classList.remove("ring-2", "ring-primary", "bg-primary-container/20");
    if (dot) { dot.classList.remove("bg-primary", "border-primary"); dot.classList.add("border-outline-variant"); }
  }
}

function renderKanjiGrid() {
  currentDisplay = shuffle([...kanjiData]).slice(0, 30);
  selectedKanji = new Set();
  countSpan.textContent = 0;
  grid.innerHTML = "";
  currentDisplay.forEach(d => {
    const card = makeKanjiCard(d);
    grid.appendChild(card);
  });
}

document.getElementById("reshuffle-btn").addEventListener("click", renderKanjiGrid);

document.getElementById("select-all-btn").addEventListener("click", () => {
  const allSelected = selectedKanji.size === currentDisplay.length;
  if (allSelected) {
    selectedKanji.clear();
    document.querySelectorAll(".kanji-card").forEach(c => updateCardVisual(c, false));
    document.getElementById("select-all-btn").querySelector("span:last-child").textContent = "Select All Visible";
  } else {
    currentDisplay.forEach(d => selectedKanji.add(d.char));
    document.querySelectorAll(".kanji-card").forEach(c => updateCardVisual(c, true));
    document.getElementById("select-all-btn").querySelector("span:last-child").textContent = "Deselect All";
  }
  countSpan.textContent = selectedKanji.size;
});

document.getElementById("mode-romaji").addEventListener("click", () => {
  quizMode = "romaji";
  document.getElementById("mode-romaji").className = "flex-1 px-4 py-2 rounded-md bg-surface-bright shadow-sm text-on-surface font-body-md font-medium transition-all";
  document.getElementById("mode-meaning").className = "flex-1 px-4 py-2 rounded-md text-on-surface-variant hover:text-on-surface font-body-md font-medium transition-all";
});

document.getElementById("mode-meaning").addEventListener("click", () => {
  quizMode = "meaning";
  document.getElementById("mode-meaning").className = "flex-1 px-4 py-2 rounded-md bg-surface-bright shadow-sm text-on-surface font-body-md font-medium transition-all";
  document.getElementById("mode-romaji").className = "flex-1 px-4 py-2 rounded-md text-on-surface-variant hover:text-on-surface font-body-md font-medium transition-all";
});

startBtn.addEventListener("click", () => {
  const pool = kanjiData.filter(d => selectedKanji.has(d.char));
  if (pool.length === 0) return;
  quizContainer.classList.remove("hidden");
  requestAnimationFrame(() => quizContainer.scrollIntoView({ behavior: "smooth", block: "start" }));
  startQuiz(quizContainer, pool, quizMode, "kanji", {
    multiChar: quizMode === "romaji",
    onAnswer: (correct, total) => updateSakura(correct, total),
    onComplete: (correct, total) => updateProgress("kanji", correct, correct),
    onBack: () => {
      quizContainer.classList.add("hidden");
      quizContainer.innerHTML = "";
      document.querySelector("main").scrollIntoView({ behavior: "smooth" });
    }
  });
});

initSakura("progressive");
renderKanjiGrid();
</script>
