<nav aria-label="Main navigation" class="hidden md:flex bg-surface/80 backdrop-blur-md border-b border-outline-variant/30 fixed top-0 w-full z-50 justify-between items-center px-6 py-4">
  <div class="font-headline-md text-headline-md font-bold text-primary">NihonPath</div>
  <ul class="flex items-center gap-gutter">
    <li><a class="block py-1 text-secondary font-body-md hover:text-primary transition-colors" href="index.html">Home</a></li>
    <li><a class="block py-1 text-secondary font-body-md hover:text-primary transition-colors" href="hiragana.html">Hiragana</a></li>
    <li><a class="block py-1 text-secondary font-body-md hover:text-primary transition-colors" href="katakana.html">Katakana</a></li>
    <li><a class="block py-1 text-secondary font-body-md hover:text-primary transition-colors" href="combined.html">Combined</a></li>

  <a aria-label="Progress" class="text-secondary hover:text-primary transition-colors p-2 rounded-full hover:bg-surface-container-high" href="progress.html">

  </a>
</nav>
<main id="main-content" class="relative z-10 flex-grow pt-[96px] pb-[100px] md:pb-stack-lg max-w-container-max mx-auto px-margin-mobile md:px-margin-desktop w-full flex flex-col gap-stack-lg">
  <section class="text-center">
    <h1 class="text-[24px] font-display-lg-mobile text-display-lg-mobile md:font-display-lg md:text-display-lg text-primary">Progress</h1>
  </section>
  <section class="bg-surface-container-lowest rounded-xl border border-outline-variant/30 p-4 md:p-6 shadow-sm">
    <div class="text-center pb-3 mb-3 border-b border-outline-variant/20">
      <span class="font-label-caps text-label-caps text-secondary">OVERALL</span>
      <div class="font-headline-md text-headline-md text-primary font-bold mt-1" id="overall-pct">0%</div>
    </div>
    <div class="flex flex-col gap-3" id="progress-detail"></div>
    <div class="mt-4 pt-4 border-t border-outline-variant/20 text-center w-full">
      <button onclick="if(confirm('This will erase all your progress data. Are you sure?')){localStorage.removeItem('nihonpath_progress');location.reload()}" class="w-full px-4 py-2 rounded-lg border border-error text-error hover:bg-error-container transition-colors text-sm font-medium">
        <span class="material-symbols-outlined text-[16px] align-middle mr-1" aria-hidden="true">delete</span> Reset Progress
      </button>
    </div>
  </section>
</main>
<nav aria-label="Main navigation" class="md:hidden bg-surface border-t border-outline-variant/20 shadow-sm fixed bottom-0 left-0 w-full z-50 flex items-stretch overflow-hidden rounded-t-xl">

    <span class="material-symbols-outlined text-[20px]" aria-hidden="true">home</span>
    <span class="font-bold text-[9px] tracking-normal">Home</span>
  </a>
  <a class="flex-1 flex flex-col items-center justify-center py-2 bg-primary-container text-on-primary-container" href="progress.html">
    <span class="material-symbols-outlined text-[20px]" aria-hidden="true" style="font-variation-settings: 'FILL' 1;">leaderboard</span>
    <span class="font-bold text-[9px] tracking-normal">Progress</span>
  </a>
</nav>
<script src="../js/progress.js"></script>
<script>
function renderProgressDetail() {
  const totals = { hiragana: 71, katakana: 71, combined: 142, kanji: 500, vocab: 200 };
  const sections = [
    { key: "hiragana", label: "Hiragana" },
    { key: "katakana", label: "Katakana" },
    { key: "combined", label: "Combined" },
    { key: "kanji", label: "Kanji (N5-N3)" },
    { key: "vocab", label: "Vocabulary" }
  ];
  const container = document.getElementById("progress-detail");
  if (!container) return;
  const data = getProgress();
  container.innerHTML = sections.map(s => {
    const d = data[s.key] || { attempted: 0, correct: 0 };
    const cov = getCoverage(s.key, totals[s.key]);
    return `
      <div>
        <div class="flex justify-between items-center mb-1">
          <span class="font-body-md text-body-md text-on-surface font-medium">${s.label}</span>
          <span class="text-sm text-secondary">${d.correct} / ${d.attempted} correct</span>
        </div>
        <div class="flex justify-between items-center mb-unit">
          <span class="font-label-caps text-label-caps text-secondary">${d.attempted} / ${totals[s.key]} chars explored</span>
          <span class="font-label-caps text-label-caps text-primary">${cov}%</span>
        </div>
        <div class="h-[8px] bg-surface-container-highest rounded-full w-full overflow-hidden">
          <div class="h-full bg-primary rounded-full transition-all duration-1000 ease-out" style="width: ${Math.min(100, parseFloat(cov))}%"></div>
        </div>
      </div>
    `;
  }).join("");
  document.getElementById("overall-pct").textContent = getOverallCoverage() + "%";
}
renderProgressDetail();
</script>
</body>
</html>
