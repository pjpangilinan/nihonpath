<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#faf9f6">
<title>NihonPath — Vocabulary</title>
<link href="../css/tailwind.css" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<link rel="prefetch" href="index.html">
<link rel="prefetch" href="progress.html">
</head>
<body class="text-on-surface antialiased min-h-screen flex flex-col washi-bg">
<a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 focus:z-[60] focus:bg-surface focus:text-on-surface focus:p-3 focus:rounded-lg focus:shadow-lg">Skip to main content</a>
<div id="sakura-container"></div>
<nav aria-label="Main navigation" class="hidden md:flex bg-surface/80 backdrop-blur-md border-b border-outline-variant/30 fixed top-0 w-full z-50 justify-between items-center px-6 py-4">
  <div class="font-headline-md text-headline-md font-bold text-primary">NihonPath</div>
  <ul class="flex items-center gap-gutter">
    <li><a class="block py-1 text-secondary font-body-md hover:text-primary transition-colors" href="index.html">Home</a></li>
    <li><a class="block py-1 text-secondary font-body-md hover:text-primary transition-colors" href="hiragana.html">Hiragana</a></li>
    <li><a class="block py-1 text-secondary font-body-md hover:text-primary transition-colors" href="katakana.html">Katakana</a></li>
    <li><a class="block py-1 text-secondary font-body-md hover:text-primary transition-colors" href="combined.html">Combined</a></li>
    <li><a class="block py-1 text-secondary font-body-md hover:text-primary transition-colors" href="kanji.html">Kanji</a></li>
    <li><a class="block py-1 text-primary font-bold border-b-2 border-primary" href="vocab.html">Vocab</a></li>
  </ul>
  <a aria-label="Progress" class="text-secondary hover:text-primary transition-colors p-2 rounded-full hover:bg-surface-container-high" href="progress.html">
    <span class="material-symbols-outlined text-[28px]" aria-hidden="true" style="font-variation-settings:'FILL' 1">account_circle</span>
  </a>
</nav>
<main id="main-content" class="relative z-10 flex-grow pt-[96px] pb-[100px] md:pb-stack-lg max-w-container-max mx-auto px-margin-mobile md:px-margin-desktop w-full flex flex-col gap-stack-lg">
  <section class="mb-0 text-center md:text-left">
    <h1 class="text-[24px] font-display-lg-mobile text-display-lg-mobile md:font-display-lg md:text-display-lg text-primary">Vocabulary</h1>
    <p class="font-body-lg text-body-lg text-on-surface-variant">200 Japanese words. Practice Japanese to English or English to Japanese.</p>
  </section>
  <section class="flex items-center gap-2 text-primary font-headline-md text-headline-md px-1">
    <span class="material-symbols-outlined" aria-hidden="true">select_check_box</span>
    <span>Selected: <strong class="font-bold" id="selected-count">0</strong></span>
  </section>
  <section class="bg-surface-container-low rounded-xl p-stack-md shadow-sm border border-outline-variant/20">
    <div class="flex flex-col md:flex-row items-center gap-stack-sm w-full">
      <div class="flex bg-surface-container-high rounded-lg p-1 w-full">
        <button id="mode-j2e" class="flex-1 px-4 py-2 rounded-md bg-surface-bright shadow-sm text-on-surface font-body-md font-medium transition-colors">Japanese → English</button>
        <button id="mode-e2j" class="flex-1 px-4 py-2 rounded-md text-on-surface-variant hover:text-on-surface font-body-md font-medium transition-colors">English → Japanese</button>
      </div>
      <button id="start-quiz-btn" class="flex-1 px-6 py-2 rounded-lg bg-primary text-on-primary font-body-md font-medium shadow-sm hover:shadow-md hover:bg-surface-tint transition-all flex items-center justify-center gap-2">
        <span class="material-symbols-outlined text-[20px]" aria-hidden="true">play_arrow</span> Start Quiz
      </button>
    </div>
  </section>
  <section id="quiz-container" class="hidden bg-surface-bright rounded-xl border border-outline-variant/30 p-gutter shadow-sm"></section>
</main>
<nav aria-label="Main navigation" class="md:hidden bg-surface border-t border-outline-variant/20 shadow-sm fixed bottom-0 left-0 w-full z-50 flex items-stretch overflow-hidden rounded-t-xl">
  <a class="flex-1 flex flex-col items-center justify-center py-2 text-secondary hover:bg-surface-container-high transition-colors" href="index.html">
    <span class="material-symbols-outlined text-[20px]" aria-hidden="true">home</span>
    <span class="font-bold text-[9px] tracking-normal">Home</span>
  </a>
  <a class="flex-1 flex flex-col items-center justify-center py-2 text-secondary hover:bg-surface-container-high transition-colors" href="progress.html">
    <span class="material-symbols-outlined text-[20px]" aria-hidden="true">leaderboard</span>
    <span class="font-bold text-[9px] tracking-normal">Progress</span>
  </a>
</nav>
<script src="../js/data.js"></script>
<script src="../js/tts.js"></script>
<script src="../js/progress.js"></script>
<script src="../js/sakura.js"></script>
<script src="../js/quiz.js"></script>
<script>
let quizMode = "j2e";

const quizContainer = document.getElementById("quiz-container");
const startBtn = document.getElementById("start-quiz-btn");

document.getElementById("mode-j2e").addEventListener("click", () => {
  quizMode = "j2e";
  document.getElementById("mode-j2e").className = "flex-1 px-4 py-2 rounded-md bg-surface-bright shadow-sm text-on-surface font-body-md font-medium transition-all";
  document.getElementById("mode-e2j").className = "flex-1 px-4 py-2 rounded-md text-on-surface-variant hover:text-on-surface font-body-md font-medium transition-all";
});

document.getElementById("mode-e2j").addEventListener("click", () => {
  quizMode = "e2j";
  document.getElementById("mode-e2j").className = "flex-1 px-4 py-2 rounded-md bg-surface-bright shadow-sm text-on-surface font-body-md font-medium transition-all";
  document.getElementById("mode-j2e").className = "flex-1 px-4 py-2 rounded-md text-on-surface-variant hover:text-on-surface font-body-md font-medium transition-all";
});

startBtn.addEventListener("click", () => {
  quizContainer.classList.remove("hidden");
  requestAnimationFrame(() => quizContainer.scrollIntoView({ behavior: "smooth", block: "start" }));
  startQuiz(quizContainer, vocabData, quizMode, "vocab", {
    onComplete: (correct, total) => updateProgress("vocab", correct, correct),
    onBack: () => {
      quizContainer.classList.add("hidden");
      quizContainer.innerHTML = "";
      document.querySelector("main").scrollIntoView({ behavior: "smooth" });
    }
  });
});

initSakura("progressive");
</script>
</body>
</html>
