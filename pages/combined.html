<script src="../js/data.js"></script>
<script src="../js/tts.js"></script>
<script src="../js/progress.js"></script>
<script src="../js/sakura.js"></script>
<script src="../js/chart.js"></script>
<script src="../js/quiz.js"></script>
<script>
let currentSelection = new Set();
let currentTab = "hiragana";
const chartContainer = document.getElementById("chart-container");
const quizContainer = document.getElementById("quiz-container");
const startBtn = document.getElementById("start-quiz-btn");
const listenBtn = document.getElementById("listen-btn");
const selectAllBtn = document.getElementById("select-all-btn");
const clearBtn = document.getElementById("clear-btn");
const countSpan = document.getElementById("selected-count");
const poolCount = document.getElementById("pool-count");
const combinedAcc = document.getElementById("combined-acc");

combinedAcc.textContent = getAccuracy("combined") + "%";

function renderCombinedChart(tab) {
  const data = tab === "hiragana" ? hiraganaData : katakanaData;
  const groups = tab === "hiragana" ? hiraganaGroups : katakanaGroups;
  const initial = [...currentSelection].filter(c => data.some(d => d.char === c));
  renderChart(chartContainer, data, groups, {
    onSelectionChange: updateCombinedSelection,
    onCharClick: (char) => speak(char)
  }, initial);
}

function updateCombinedSelection(sel) {
  const otherData = currentTab === "hiragana" ? katakanaData : hiraganaData;
  const otherChars = new Set(otherData.map(d => d.char));
  const otherSelected = [...currentSelection].filter(c => otherChars.has(c));
  currentSelection = new Set([...sel, ...otherSelected]);
  countSpan.textContent = currentSelection.size;
  updatePoolCount();
}

function updatePoolCount() {
  poolCount.textContent = currentSelection.size;
  if (currentSelection.size > 0) {
    startBtn.disabled = false;
    startBtn.className = "flex items-center gap-2 px-6 py-2 rounded-full bg-primary text-on-primary cursor-pointer shadow-md transition-colors font-bold";
  } else {
    startBtn.disabled = true;
    startBtn.className = "flex items-center gap-2 px-6 py-2 rounded-full bg-surface-variant text-on-surface-variant cursor-not-allowed transition-colors font-bold";
  }
}

function switchTab(tab) {
  currentTab = tab;
  const hiraganaTab = document.getElementById("tab-hiragana");
  const katakanaTab = document.getElementById("tab-katakana");
  if (tab === "hiragana") {
    hiraganaTab.className = "flex-1 pb-3 px-2 font-headline-md text-headline-md text-center text-primary border-b-2 border-primary";
    hiraganaTab.setAttribute("aria-selected", "true");
    katakanaTab.className = "flex-1 pb-3 px-2 font-headline-md text-headline-md text-center text-secondary hover:text-on-surface transition-colors";
    katakanaTab.setAttribute("aria-selected", "false");
  } else {
    katakanaTab.className = "flex-1 pb-3 px-2 font-headline-md text-headline-md text-center text-primary border-b-2 border-primary";
    katakanaTab.setAttribute("aria-selected", "true");
    hiraganaTab.className = "flex-1 pb-3 px-2 font-headline-md text-headline-md text-center text-secondary hover:text-on-surface transition-colors";
    hiraganaTab.setAttribute("aria-selected", "false");
  }
  renderCombinedChart(tab);
}

document.getElementById("tab-hiragana").addEventListener("click", () => switchTab("hiragana"));
document.getElementById("tab-katakana").addEventListener("click", () => switchTab("katakana"));
document.getElementById("tab-hiragana").addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight") { e.preventDefault(); switchTab("katakana"); document.getElementById("tab-katakana").focus(); }
});
document.getElementById("tab-katakana").addEventListener("keydown", (e) => {
  if (e.key === "ArrowLeft") { e.preventDefault(); switchTab("hiragana"); document.getElementById("tab-hiragana").focus(); }
});

selectAllBtn.addEventListener("click", () => {
  const data = currentTab === "hiragana" ? hiraganaData : katakanaData;
  const otherData = currentTab === "hiragana" ? katakanaData : hiraganaData;
  const all = data.map(d => d.char);
  const otherSelected = [...currentSelection].filter(c => otherData.some(d => d.char === c));
  currentSelection = new Set([...all, ...otherSelected]);
  countSpan.textContent = currentSelection.size;
  renderCombinedChart(currentTab);
  updatePoolCount();
});

clearBtn.addEventListener("click", () => {
  currentSelection = new Set();
  countSpan.textContent = 0;
  renderCombinedChart(currentTab);
  updatePoolCount();
});

listenBtn.addEventListener("click", () => {
  currentSelection.forEach(char => speak(char));
});

startBtn.addEventListener("click", () => {
  const pool = [...hiraganaData.filter(d => currentSelection.has(d.char)), ...katakanaData.filter(d => currentSelection.has(d.char))];
  if (pool.length === 0) return;
  quizContainer.classList.remove("hidden");
  requestAnimationFrame(() => quizContainer.scrollIntoView({ behavior: "smooth", block: "start" }));
  startQuiz(quizContainer, pool, "romaji", "combined", {
    multiChar: true,
    onAnswer: (correct, total) => updateSakura(correct, total),
    onComplete: (correct, total) => {
      updateProgress("combined", correct, correct);
      combinedAcc.textContent = getAccuracy("combined") + "%";
    },
    onBack: () => {
      quizContainer.classList.add("hidden");
      quizContainer.innerHTML = "";
      document.querySelector("main").scrollIntoView({ behavior: "smooth" });
    }
  });
});

initSakura("progressive");
renderCombinedChart("hiragana");
</script>
</body>
