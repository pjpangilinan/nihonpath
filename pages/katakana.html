<script>
let currentSelection = new Set();
let currentDifficulty = "beginner";
const DIFFICULTY_UNLOCKS = { intermediate: 10, advanced: 25 };
const chartContainer = document.getElementById("chart-container");
const quizContainer = document.getElementById("quiz-container");
const startBtn = document.getElementById("start-quiz-btn");
const listenBtn = document.getElementById("listen-btn");
const selectAllBtn = document.getElementById("select-all-btn");
const clearBtn = document.getElementById("clear-btn");
const countSpan = document.getElementById("selected-count");
const difficultyBtns = document.querySelectorAll("#difficulty-row button");

const STANDARD_KEYS = ["a-row","ka-row","sa-row","ta-row","na-row","ha-row","ma-row","ya-row","ra-row","wa-row","n-row"];
const DAKUTEN_KEYS = ["ga-row","za-row","da-row","ba-row","pa-row"];

function getFilteredGroups(baseGroups) {
  if (currentDifficulty === "beginner") return baseGroups.filter(g => STANDARD_KEYS.includes(g.key));
  if (currentDifficulty === "intermediate") return baseGroups.filter(g => [...STANDARD_KEYS, ...DAKUTEN_KEYS].includes(g.key));
  return baseGroups;
}

function updateDifficultyLocks() {
  const total = getTotalCorrect();
  difficultyBtns.forEach(btn => {
    const d = btn.dataset.difficulty;
    if (d === "beginner") return;
    const unlockAt = DIFFICULTY_UNLOCKS[d];
    const locked = total < unlockAt;
    btn.disabled = locked;
    if (locked) {
      btn.className = "flex-1 px-3 py-1.5 rounded-full text-sm font-medium bg-surface border border-outline-variant text-secondary cursor-not-allowed";
      const span = btn.querySelector("span.material-symbols-outlined");
      if (!span) btn.innerHTML = '<span class="material-symbols-outlined text-[14px] align-middle mr-0.5">lock</span> ' + d.charAt(0).toUpperCase() + d.slice(1);
    } else {
      btn.className = d === currentDifficulty
        ? "flex-1 px-3 py-1.5 rounded-full text-sm font-medium bg-primary text-on-primary shadow-sm cursor-pointer"
        : "flex-1 px-3 py-1.5 rounded-full text-sm font-medium bg-surface border border-outline-variant text-secondary hover:bg-surface-container-high transition-colors cursor-pointer";
      if (btn.querySelector("span.material-symbols-outlined")) {
        btn.innerHTML = d.charAt(0).toUpperCase() + d.slice(1);
      }
    }
    if (btn.dataset.difficulty === currentDifficulty && !locked) {
      btn.className = "flex-1 px-3 py-1.5 rounded-full text-sm font-medium bg-primary text-on-primary shadow-sm cursor-pointer";
    }
  });
}

function renderDifficultyChart(initialSelection) {
  const groups = getFilteredGroups(katakanaGroups);
  renderChart(chartContainer, katakanaData, groups, {
    onSelectionChange: (sel) => {
      currentSelection = sel;
      countSpan.textContent = sel.size;
      startBtn.disabled = sel.size === 0;
      startBtn.className = sel.size > 0 ? "flex items-center gap-2 px-6 py-2 rounded-full bg-primary text-on-primary cursor-pointer shadow-md transition-colors font-bold" : "flex items-center gap-2 px-6 py-2 rounded-full bg-surface-variant text-on-surface-variant cursor-not-allowed transition-colors font-bold";
    },
    onCharClick: (char) => speak(char)
  }, initialSelection);
}

difficultyBtns.forEach(btn => {
  btn.addEventListener("click", () => {
    if (btn.disabled) return;
    currentDifficulty = btn.dataset.difficulty;
    updateDifficultyLocks();
    renderDifficultyChart([...currentSelection]);
  });
});

renderDifficultyChart();

selectAllBtn.addEventListener("click", () => {
  const groups = getFilteredGroups(katakanaGroups);
  const visibleKeys = new Set(groups.map(g => g.key));
  const all = katakanaData.filter(d => visibleKeys.has(d.group)).map(d => d.char);
  currentSelection = new Set(all);
  countSpan.textContent = currentSelection.size;
  renderDifficultyChart(all);
  startBtn.disabled = false;
  startBtn.className = "flex items-center gap-2 px-6 py-2 rounded-full bg-primary text-on-primary cursor-pointer shadow-md transition-colors font-bold";
});

clearBtn.addEventListener("click", () => {
  currentSelection = new Set();
  countSpan.textContent = 0;
  renderDifficultyChart([]);
  startBtn.disabled = true;
  startBtn.className = "flex items-center gap-2 px-6 py-2 rounded-full bg-surface-variant text-on-surface-variant cursor-not-allowed transition-colors font-bold";
});

listenBtn.addEventListener("click", () => {
  currentSelection.forEach(char => speak(char));
});

startBtn.addEventListener("click", () => {
  const pool = katakanaData.filter(d => currentSelection.has(d.char));
  if (pool.length === 0) return;
  quizContainer.classList.remove("hidden");
  requestAnimationFrame(() => quizContainer.scrollIntoView({ behavior: "smooth", block: "start" }));
  startQuiz(quizContainer, pool, "romaji", "katakana", {
    multiChar: true,
    onAnswer: (correct, total) => updateSakura(correct, total),
    onComplete: (correct, total) => {
      updateProgress("katakana", correct, correct);
      updateDifficultyLocks();
    },
    onBack: () => {
      quizContainer.classList.add("hidden");
      quizContainer.innerHTML = "";
      document.querySelector("main").scrollIntoView({ behavior: "smooth" });
    }
  });
});

initSakura("progressive");
updateDifficultyLocks();
</script>
