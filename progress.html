<script>
function renderProgressDetail() {
  const totals = { hiragana: 71, katakana: 71, combined: 142, kanji: 100 };
  const sections = [
    { key: "hiragana", label: "Hiragana" },
    { key: "katakana", label: "Katakana" },
    { key: "combined", label: "Combined" },
    { key: "kanji", label: "Kanji (N5)" }
  ];
  const container = document.getElementById("progress-detail");
  if (!container) return;
  const data = getProgress();
  container.innerHTML = sections.map(s => {
    const d = data[s.key] || { attempted: 0, correct: 0 };
    const cov = getCoverage(s.key, totals[s.key]);
    return `
      <div>
        <div class="flex justify-between items-center mb-1">
          <span class="font-body-md text-body-md text-on-surface font-medium">${s.label}</span>
          <span class="text-sm text-secondary">${d.correct} / ${d.attempted} correct</span>
        </div>
        <div class="flex justify-between items-center mb-unit">
          <span class="font-label-caps text-label-caps text-secondary">${d.attempted} / ${totals[s.key]} chars explored</span>
          <span class="font-label-caps text-label-caps text-primary">${cov}%</span>
        </div>
        <div class="h-[8px] bg-surface-container-highest rounded-full w-full overflow-hidden">
          <div class="h-full bg-primary rounded-full transition-all duration-1000 ease-out" style="width: ${Math.min(100, parseFloat(cov))}%"></div>
        </div>
      </div>
    `;
  }).join("");
  document.getElementById("overall-pct").textContent = getOverallCoverage() + "%";
}
renderProgressDetail();
</script>
